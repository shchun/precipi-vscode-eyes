document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');

    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
    
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"3bb52488-3431-48a8-93b0-f501a9a08c28\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  @keyframes popMark { 0%{ transform: translateX(-50%) translateY(10px) scale(0.3) rotate(-12deg); opacity:0; } 45%{ transform: translateX(-50%) translateY(-6px) scale(1.2) rotate(6deg); opacity:1; } 100%{ transform: translateX(-50%) translateY(0) scale(1) rotate(0deg); opacity:1; } }\n  @keyframes sweatDrop { 0%{ transform: translate(0,-6px) scale(0.4); opacity:0; } 30%{ opacity:1; } 100%{ transform: translate(0,40px) scale(1); opacity:0; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div onmousemove=\"{{ onMove }}\" onmousedown=\"{{ onDown }}\" style=\"position:fixed; inset:0; background:#efe9df; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:52px; cursor:crosshair; user-select:none; overflow:hidden; font-family:ui-sans-serif,system-ui,sans-serif;\">\n\n  <div ref=\"{{ groupRef }}\" style=\"{{ groupStyle }}\">\n    <div style=\"{{ surpriseMarkStyle }}\">!?<\u002Fdiv>\n    <div style=\"{{ sweatStyle }}\"><\u002Fdiv>\n\n    <div style=\"{{ eyeWrapStyle }}\">\n      <div ref=\"{{ leftRef }}\" style=\"{{ eyeStyle }}\">\n        <div style=\"{{ leftIrisStyle }}\">\n          <div style=\"{{ irisRingStyle }}\"><\u002Fdiv>\n          <div style=\"{{ pupilStyle }}\"><\u002Fdiv>\n          <div style=\"{{ glintBigStyle }}\"><\u002Fdiv>\n          <div style=\"{{ glintSmallStyle }}\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"{{ scleraShadeStyle }}\"><\u002Fdiv>\n        <div style=\"{{ leftLidStyle }}\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"{{ eyeWrapStyle }}\">\n      <div ref=\"{{ rightRef }}\" style=\"{{ eyeStyle }}\">\n        <div style=\"{{ rightIrisStyle }}\">\n          <div style=\"{{ irisRingStyle }}\"><\u002Fdiv>\n          <div style=\"{{ pupilStyle }}\"><\u002Fdiv>\n          <div style=\"{{ glintBigStyle }}\"><\u002Fdiv>\n          <div style=\"{{ glintSmallStyle }}\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"{{ scleraShadeStyle }}\"><\u002Fdiv>\n        <div style=\"{{ rightLidStyle }}\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"font-size:13px; letter-spacing:0.18em; text-transform:uppercase; color:#b3a99a;\">move your mouse · click to surprise<\u002Fdiv>\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { surprised: false, lidL: 0, lidR: 0, shake: 0 };\n\n  componentDidMount() {\n    this.leftRef = React.createRef();\n    this.rightRef = React.createRef();\n    this.groupRef = React.createRef();\n    this.mx = -9999; this.my = -9999;\n    this._onMove = (e) => { this.mx = e.clientX; this.my = e.clientY; };\n    window.addEventListener('mousemove', this._onMove);\n    this.p = { L: { x: 0, y: 0, vx: 0, vy: 0 }, R: { x: 0, y: 0, vx: 0, vy: 0 } };\n    this._raf = requestAnimationFrame(this.tick);\n    this.scheduleBlink();\n    this.forceUpdate();\n  }\n\n  componentWillUnmount() {\n    cancelAnimationFrame(this._raf);\n    clearTimeout(this._blinkT);\n    clearTimeout(this._surpT);\n    window.removeEventListener('mousemove', this._onMove);\n  }\n\n  scheduleBlink() {\n    const next = 1500 + Math.random() * 2800;\n    this._blinkT = setTimeout(() => {\n      if (!this.state.surprised) {\n        if (Math.random() < 0.13) {\n          const eye = Math.random() < 0.5 ? 'lidL' : 'lidR';\n          this.setState({ [eye]: 1 });\n          setTimeout(() => this.setState({ [eye]: 0 }), 320);\n        } else {\n          this.setState({ lidL: 1, lidR: 1 });\n          setTimeout(() => this.setState({ lidL: 0, lidR: 0 }), 150);\n        }\n      }\n      this.scheduleBlink();\n    }, next);\n  }\n\n  target(ref) {\n    const el = ref && ref.current;\n    if (!el) return { x: 0, y: 0 };\n    const r = el.getBoundingClientRect();\n    const cx = r.left + r.width / 2;\n    const cy = r.top + r.height / 2;\n    const dx = this.mx - cx, dy = this.my - cy;\n    const ang = Math.atan2(dy, dx);\n    const reach = Math.min(Math.hypot(dx, dy) / 6, 1);\n    return { x: Math.cos(ang) * reach, y: Math.sin(ang) * reach };\n  }\n\n  tick = () => {\n    const stiff = 0.16, damp = 0.72;\n    const tl = this.target(this.leftRef);\n    const tr = this.target(this.rightRef);\n    let moved = false;\n    [['L', tl], ['R', tr]].forEach(([k, t]) => {\n      const s = this.p[k];\n      s.vx = (s.vx + (t.x - s.x) * stiff) * damp;\n      s.vy = (s.vy + (t.y - s.y) * stiff) * damp;\n      s.x += s.vx; s.y += s.vy;\n      if (Math.abs(s.vx) > 0.0005 || Math.abs(s.vy) > 0.0005) moved = true;\n    });\n    if (this.state.surprised) this.setState({ shake: (Math.random() - 0.5) * 14 });\n    if (moved || this.state.surprised) this.forceUpdate();\n    this._raf = requestAnimationFrame(this.tick);\n  };\n\n  renderVals() {\n    const surprised = this.state.surprised;\n    const eyeW = surprised ? 172 : 152;\n    const eyeH = surprised ? 268 : 244;\n    const irisSize = surprised ? 122 : 100;\n    const pupilSize = surprised ? 64 : 46;\n    const maxX = eyeW * (surprised ? 0.09 : 0.15);\n    const maxY = eyeH * (surprised ? 0.12 : 0.22);\n\n    const off = (s) => ({ x: s.x * maxX, y: s.y * maxY });\n    const lo = off(this.p.L), ro = off(this.p.R);\n\n    const groupStyle = {\n      position: 'relative', display: 'flex', gap: '26px',\n      transform: surprised ? `translate(${this.state.shake}px, -16px)` : 'translate(0,0)',\n      transition: surprised ? 'transform 0.04s linear' : 'transform 0.4s cubic-bezier(.2,1.3,.4,1)',\n    };\n\n    const eyeStyle = {\n      position: 'relative', overflow: 'hidden',\n      width: eyeW + 'px', height: eyeH + 'px',\n      borderRadius: '50%',\n      background: 'radial-gradient(120% 100% at 50% 78%, #ffffff 0%, #f3f1ee 70%, #e7e2db 100%)',\n      border: '8px solid #14110f',\n      boxShadow: '0 14px 34px rgba(0,0,0,0.16), inset 0 10px 16px rgba(20,17,15,0.12)',\n      transition: 'width 0.18s cubic-bezier(.2,1.5,.4,1), height 0.18s cubic-bezier(.2,1.5,.4,1)',\n      flex: '0 0 auto',\n    };\n\n    // realistic iris — radial brown with limbal ring, follows mouse via spring\n    const irisBase = (o) => ({\n      position: 'absolute', top: '50%', left: '50%',\n      width: irisSize + 'px', height: irisSize + 'px', borderRadius: '50%',\n      marginTop: (-irisSize / 2) + 'px', marginLeft: (-irisSize / 2) + 'px',\n      transform: `translate(${o.x}px, ${o.y}px)`,\n      background: 'radial-gradient(circle at 42% 34%, #4a3120 0%, #311e12 40%, #1c110a 70%, #0a0603 100%)',\n      boxShadow: 'inset 0 0 14px 2px rgba(0,0,0,0.5), 0 2px 6px rgba(0,0,0,0.25)',\n    });\n\n    const irisRingStyle = {\n      position: 'absolute', inset: '0', borderRadius: '50%',\n      boxShadow: 'inset 0 0 0 5px rgba(20,12,6,0.55)',\n      background: 'radial-gradient(circle at 50% 50%, transparent 52%, rgba(120,78,44,0.35) 70%, transparent 86%)',\n      pointerEvents: 'none',\n    };\n\n    const pupilStyle = {\n      position: 'absolute', top: '50%', left: '50%',\n      width: pupilSize + 'px', height: pupilSize + 'px', borderRadius: '50%',\n      marginTop: (-pupilSize / 2) + 'px', marginLeft: (-pupilSize / 2) + 'px',\n      background: 'radial-gradient(circle at 50% 50%, #000 60%, #160d06 100%)',\n      transition: 'width 0.16s cubic-bezier(.2,1.7,.4,1), height 0.16s cubic-bezier(.2,1.7,.4,1)',\n      boxShadow: '0 0 6px rgba(0,0,0,0.4)',\n    };\n\n    const glintBigStyle = {\n      position: 'absolute', top: '20%', left: '24%',\n      width: '30%', height: '30%', borderRadius: '50%',\n      background: 'radial-gradient(circle at 38% 38%, rgba(255,255,255,0.98), rgba(255,255,255,0.15) 70%, transparent)',\n      pointerEvents: 'none',\n    };\n    const glintSmallStyle = {\n      position: 'absolute', bottom: '24%', right: '26%',\n      width: '13%', height: '13%', borderRadius: '50%',\n      background: 'rgba(255,255,255,0.65)',\n      pointerEvents: 'none',\n    };\n\n    // soft shadow the upper lid casts onto the sclera\n    const scleraShadeStyle = {\n      position: 'absolute', inset: '0', borderRadius: '50%', pointerEvents: 'none',\n      background: 'radial-gradient(130% 70% at 50% -8%, rgba(20,15,10,0.30) 0%, rgba(20,15,10,0.10) 28%, transparent 50%)',\n    };\n\n    // ---- upper eyelid that descends from the top ----\n    const lidH = eyeH + 70;\n    const openEdge = eyeH * 0.16;          // where the lash line rests when open\n    const closeEdge = eyeH * 0.98;         // lid sweeps almost fully down for a clean blink\n    const lidPx = (amt) => (openEdge + (closeEdge - openEdge) * amt) - lidH;\n    const lidStyle = (amt) => ({\n      position: 'absolute', left: '-14%', right: '-14%', top: '0',\n      height: lidH + 'px',\n      background: 'linear-gradient(#efe9df 0%, #efe9df 82%, #e4ddd1 100%)',\n      borderRadius: '0 0 46% 46% / 0 0 22% 22%',\n      borderBottom: '4px solid #14110f',\n      boxShadow: '0 5px 9px rgba(20,17,15,0.22)',\n      transform: `translateY(${lidPx(amt)}px)`,\n      transition: 'transform 0.13s cubic-bezier(.45,.05,.55,.95)',\n      zIndex: 3,\n    });\n\n    // ---- Daisy-style eyelashes: a separate, UNCLIPPED layer over each eye ----\n    // Drawn for the RIGHT eye in a 160x160 viewBox whose y=0 sits on the eye's\n    // top; the left eye mirrors via scaleX(-1). Roots ride the eye's upper-outer\n    // edge and the long blades curl up & out, sweeping well past the eye outline.\n    const A = 80, B = 80 * eyeH / eyeW, CX = 80, CY = B;   // eye ellipse in viewBox units\n    const edgeY = (u) => { const dn = (u * 160 - CX) / A; return CY - B * Math.sqrt(Math.max(0, 1 - dn * dn)); };\n    const NL = 6;\n    const u0 = 0.50, u1 = 0.94;                      // outer half only — inner/center stays bare\n    const lashPaths = [];\n    for (let i = 0; i < NL; i++) {\n      const k = i / (NL - 1);                        // 0 inner → 1 outer corner\n      const u = u0 + k * (u1 - u0);\n      const rx = u * 160, ry = edgeY(u);             // root on the eye's upper edge\n      let nx = (rx - CX) / (A * A), ny = (ry - CY) / (B * B);   // outward ellipse normal\n      const nl = Math.hypot(nx, ny) || 1; nx /= nl; ny /= nl;\n      const ang = Math.atan2(ny, nx);               // points up-and-out along the outer-top\n      const len = 46 + Math.pow(k, 0.8) * 62;       // dramatically longer toward the outer corner\n      const curl = 0.5 + k * 0.55;                   // hooks up harder toward the corner\n      const a1 = ang - curl * 0.35;\n      const a2 = ang - curl;\n      const cx = rx + Math.cos(a1) * len * 0.55;\n      const cy = ry + Math.sin(a1) * len * 0.55;\n      const tx = cx + Math.cos(a2) * len * 0.55;\n      const ty = cy + Math.sin(a2) * len * 0.55;\n      const d = `M ${rx.toFixed(1)} ${ry.toFixed(1)} Q ${cx.toFixed(1)} ${cy.toFixed(1)} ${tx.toFixed(1)} ${ty.toFixed(1)}`;\n      lashPaths.push({ d, w: (7.0 - k * 1.6).toFixed(1) });\n    }\n    // dark eyeliner band tracing the upper-outer rim (mascara root)\n    let lashLineD = '';\n    const RN = 18, rs = 0.44;\n    for (let i = 0; i <= RN; i++) { const u = rs + (i / RN) * (u1 - rs); lashLineD += (i ? ' L ' : 'M ') + (u * 160).toFixed(1) + ' ' + edgeY(u).toFixed(1); }\n\n    const lashSvgBase = {\n      position: 'absolute', top: '0', left: '0',\n      width: eyeW + 'px', height: eyeW + 'px',\n      overflow: 'visible', pointerEvents: 'none', zIndex: 6,\n    };\n    const lashSvgRightStyle = lashSvgBase;\n    const lashSvgLeftStyle = { ...lashSvgBase, transform: 'scaleX(-1)' };\n\n    const eyeWrapStyle = { position: 'relative', flex: '0 0 auto', width: eyeW + 'px', height: eyeH + 'px' };\n\n    const surpriseMarkStyle = {\n      position: 'absolute', top: '-54px', left: '50%', transform: 'translateX(-50%)',\n      fontSize: '44px', fontWeight: '800', color: '#e8482b',\n      opacity: surprised ? 1 : 0,\n      animation: surprised ? 'popMark 0.35s ease both' : 'none', pointerEvents: 'none',\n    };\n    const sweatStyle = {\n      position: 'absolute', top: '-2px', right: '-34px',\n      width: '34px', height: '46px', boxSizing: 'border-box', background: 'radial-gradient(circle at 38% 30%, #8fcdec 0%, #2f8fd0 52%, #135f9e 100%)',\n      borderRadius: '60% 60% 60% 60% / 80% 80% 40% 40%',\n      border: '3.5px solid #14110f',\n      boxShadow: 'inset -5px -6px 0 rgba(255,255,255,0.55), 0 3px 8px rgba(20,17,15,0.28)',\n      opacity: 0, animation: surprised ? 'sweatDrop 0.85s ease-out 0.05s both' : 'none', pointerEvents: 'none', zIndex: 5,\n    };\n\n    return {\n      groupStyle, eyeStyle, irisRingStyle, pupilStyle, glintBigStyle, glintSmallStyle,\n      scleraShadeStyle, lashPaths, lashLineD, lashSvgLeftStyle, lashSvgRightStyle, eyeWrapStyle,\n      leftIrisStyle: irisBase(lo), rightIrisStyle: irisBase(ro),\n      leftLidStyle: lidStyle(surprised ? 0 : this.state.lidL),\n      rightLidStyle: lidStyle(surprised ? 0 : this.state.lidR),\n      surpriseMarkStyle, sweatStyle,\n      leftRef: this.leftRef, rightRef: this.rightRef, groupRef: this.groupRef,\n      onMove: (e) => { this.mx = e.clientX; this.my = e.clientY; },\n      onDown: () => {\n        clearTimeout(this._surpT);\n        this.p.L.vy -= 0.32; this.p.R.vy -= 0.32;\n        this.setState({ surprised: true });\n        this._surpT = setTimeout(() => this.setState({ surprised: false, shake: 0 }), 700);\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
